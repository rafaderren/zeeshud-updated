//Following commands are Credits handler

alias "CreditsMenuClear" "sixense_clear_bindings; sixense_write_bindings creditszees.txt"
alias "CreditsMenuLoad" "incrementvar mat_aaquality -100 100 1"

alias "CreditsMenuOn"	"CreditsMenuClear; con_logfile cfg/creditszees.txt; echo #base ../custom/zeeshud-updated/_zeeshud_base/menus/credits.res; con_logfile .; CreditsMenuLoad"
alias "CreditsMenuOff"	"CreditsMenuClear; CreditsMenuLoad"

CreditsMenuOff

